spring:
  application:
    name: dartcommons

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dartcommons}
    username: ${DB_USERNAME:dartcommons}
    password: ${DB_PASSWORD:dartcommons}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # CLAUDE.md 6-3: DDL은 Flyway만. validate/none 고정 (create/update 금지)
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # 빈 DB에 V1부터 적용. 기존 운영 DB 도입 시에만 baseline 사용
    baseline-on-migrate: false

  cache:
    type: caffeine

# API 문서 (springdoc-openapi)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

# 운영 모니터링 (Actuator) — 최소 노출
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}

dartcommons:
  dart:
    base-url: https://opendart.fss.or.kr/api
    api-key: ${DART_API_KEY}
    timeout-ms: 10000
    max-retries: 3
  # KRX OpenAPI — 종목 기본정보 / 일별시세 (stocks-master-seed Spec).
  # base-url/엔드포인트는 KRX 가이드 실측(카드 #1) 확정 후 갱신.
  krx:
    base-url: ${KRX_BASE_URL:https://data.krx.co.kr}
    api-key: ${KRX_API_KEY}
    timeout-ms: 10000
    max-retries: 3

logging:
  level:
    org.flywaydb: INFO
    com.dartcommons: DEBUG

---
# prod 프로파일: Swagger UI / API Docs 비활성화 (외부 노출 방지)
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
