spring:
  config:
    import: "optional:file:../.env[.properties]"

# 테스트 환경 — 신규 필수 프로퍼티 기본값 (실키 사용 금지, 테스트 전용 더미값)
dartcommons:
  jwt:
    secret: "test-jwt-secret-at-least-32-chars-for-hmac256-validation-ok"
    access-ttl-minutes: 30
    refresh-ttl-days: 14
  crypto:
    # base64(32 zero bytes) — 테스트 전용, 실 운영 AES_KEY와 무관
    aes-key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
