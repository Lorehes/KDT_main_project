# [목적] AWS Lightsail 단독 배포용 완전 컨테이너 스택 — postgres·backend·frontend·nginx·certbot 5서비스.
#   Lightsail에 repo clone 후 `docker compose up -d --build` 하면 소스에서 이미지 빌드→HTTPS까지 기동.
# [이유] 런타임 env는 .env 하나만 사용. 템플릿은 .env.example (cp .env.example .env).
#   - 이미지: backend/frontend는 build: 컨텍스트로 서버에서 직접 빌드(레지스트리 불필요).
#     ECR/GHCR 사용 시 BACKEND_IMAGE/FRONTEND_IMAGE 를 레지스트리 URL로 지정 후 pull.
#   - ★서버 빌드는 RAM 부담(Gradle+Next) — 최소 2GB, 권장 4GB 인스턴스. 소형이면 swap 추가 또는 ECR pull.
#   - Nginx/certbot을 호스트 apt 설치가 아니라 컨테이너로 → 호스트 사전 설정 최소화(Docker만 필요).
#   - backend/frontend는 published 포트 없음 → dartcommons-net 내부에서 nginx만 접근(외부 직접 차단).
# [사이드 임팩트] 최초 SSL 발급은 scripts/init-letsencrypt.sh 를 1회 실행해야 nginx가 정상 기동한다
#   (인증서 파일이 없으면 SSL server 블록 로드 실패 → nginx crash. dummy cert로 부트스트랩).
#   frontend에는 .env(시크릿)를 주입하지 않는다 — NEXT_PUBLIC_* 는 빌드 타임에 이미 번들에 박힘.
# [수정 시 고려사항] 도메인 변경 시 .env의 DOMAIN + certbot 재발급 + FE 이미지 재빌드(NEXT_PUBLIC_API_URL).
#   named volume 금지(CLAUDE.md §7, 2026-06-04 데이터 손실 교훈) → 모든 영속 데이터는 호스트 bind mount.
#   Ollama 온프레미스 LLM 필요 시 하단 주석 해제 + 인스턴스 8GB 이상으로 업그레이드.

services:
  # ---- PostgreSQL — bind mount(Docker reset/clean 영향 없음) ----
  postgres:
    image: postgres:16-alpine
    container_name: dartcommons-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-dartcommons}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Lightsail Ubuntu 기본 경로. PG_DATA_DIR 로 변경 가능(.env).
      - ${PG_DATA_DIR:-/home/ubuntu/data/dartcommons-pg}:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dartcommons-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dartcommons} -d ${DB_NAME:-dartcommons}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Backend (Spring Boot) — 소스에서 빌드(build:), published 포트 없음(내부 전용) ----
  # build: 있으면 이미지가 없을 때 `docker compose up` 이 자동 빌드 → Lightsail에서 레지스트리 없이 기동.
  #   ECR/GHCR 사용 시: BACKEND_IMAGE 를 레지스트리 URL로 지정 후 `docker compose pull` (build 생략).
  backend:
    image: ${BACKEND_IMAGE:-dartcommons-backend:latest}
    build:
      context: ./backend
    # pull_policy: build → 기본 정책(missing=pull)을 덮어써 `docker compose up`이 pull 대신 빌드.
    #   레지스트리(ECR/GHCR) pull로 전환 시 이 줄을 'missing'으로 바꾸거나 제거.
    pull_policy: build
    container_name: dartcommons-backend
    env_file: .env
    expose:
      - "8080"        # nginx 컨테이너만 dartcommons-net 경유로 접근. 호스트/외부 미노출.
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dartcommons-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  # ---- Frontend (Next.js standalone) — 소스에서 빌드, 시크릿 미주입(NEXT_PUBLIC_*는 빌드 타임 번들) ----
  # NEXT_PUBLIC_API_URL 은 빌드 타임에 번들에 박히므로 build.args 로 주입(런타임 주입 불가).
  #   도메인 변경 시 반드시 재빌드: docker compose build frontend
  frontend:
    image: ${FRONTEND_IMAGE:-dartcommons-frontend:latest}
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://gangwoncanvas.co.kr}
    # pull_policy: build → `docker compose up`이 레지스트리 pull 대신 소스 빌드.
    pull_policy: build
    container_name: dartcommons-frontend
    # env_file 없음 — FE 컨테이너에 DB 비밀번호/JWT/API 키를 노출하지 않는다(보안).
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dartcommons-net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # ---- Nginx 리버스 프록시 + TLS 종단 (80/443 공개) ----
  # nginx:alpine 의 템플릿 기능: /etc/nginx/templates/*.template → envsubst → /etc/nginx/conf.d/
  #   컨테이너 env로 정의된 변수(${DOMAIN})만 치환되고 $host/$remote_addr 등 nginx 변수는 보존된다.
  # command: 6시간마다 nginx -s reload → certbot 갱신 인증서 무중단 반영.
  nginx:
    image: nginx:1.27-alpine
    container_name: dartcommons-nginx
    depends_on:
      - backend
      - frontend
    environment:
      # 기본값 = 실도메인. .env 에 DOMAIN 지정 시 그 값이 우선(다른 도메인 전환 대비).
      DOMAIN: ${DOMAIN:-gangwoncanvas.co.kr}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dartcommons.conf.template:/etc/nginx/templates/dartcommons.conf.template:ro
      # certbot과 공유 — 발급 인증서(conf) + ACME challenge webroot(www). named volume 금지 → bind mount.
      - ${CERTBOT_CONF_DIR:-/home/ubuntu/data/certbot/conf}:/etc/letsencrypt:ro
      - ${CERTBOT_WWW_DIR:-/home/ubuntu/data/certbot/www}:/var/www/certbot:ro
    restart: unless-stopped
    networks:
      - dartcommons-net
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ---- Certbot — 최초 발급은 scripts/init-letsencrypt.sh(1회), 이후 12시간마다 자동 갱신 ----
  certbot:
    image: certbot/certbot:latest
    container_name: dartcommons-certbot
    volumes:
      - ${CERTBOT_CONF_DIR:-/home/ubuntu/data/certbot/conf}:/etc/letsencrypt
      - ${CERTBOT_WWW_DIR:-/home/ubuntu/data/certbot/www}:/var/www/certbot
    restart: unless-stopped
    # renew는 최초 발급 시 저장된 renewal 설정(webroot 경로)을 재사용 → 추가 인자 불필요.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

  # ---- Ollama (선택 — 온프레미스 LLM. Cloud LLM(openrouter) 사용 시 주석 유지) ----
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: dartcommons-ollama
  #   volumes:
  #     - /home/ubuntu/data/ollama:/root/.ollama
  #   expose:
  #     - "11434"
  #   restart: unless-stopped
  #   networks:
  #     - dartcommons-net

networks:
  dartcommons-net:
    driver: bridge
