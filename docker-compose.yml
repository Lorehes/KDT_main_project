# 로컬 개발용 PostgreSQL
# 사용: docker compose up -d   (Docker 설치 필요)
# 호스트 포트 5433 매핑 — 다른 프로젝트(5432 점유) 충돌 회피.
# 백엔드 접속은 .env의 DB_URL=jdbc:postgresql://localhost:5433/dartcommons 사용.
#
# [데이터 위치]
# bind mount: ${PG_DATA_DIR:-~/data/dartcommons-pg}
# named volume 대신 사용자 홈의 일반 디렉토리를 마운트한다.
# 2026-06-04 데이터 손실 사고(Docker Desktop "Clean / Purge data" 추정)로
# named volume 통째 삭제 → 91,965건 소실. bind mount는 Docker 관리 외부라
# Docker reset/clean 영향을 받지 않는다 (docs/운영가이드.md 참고).
#
# 정기 백업: scripts/data_protection/backup_db.sh (crontab 등록 권장)
services:
  postgres:
    image: postgres:16-alpine
    container_name: dartcommons-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dartcommons}
      POSTGRES_USER: ${DB_USERNAME:-dartcommons}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dartcommons}
    ports:
      - "5433:5432"
    volumes:
      # bind mount — Docker Desktop reset/clean의 영향을 받지 않는 호스트 디렉토리.
      # PG_DATA_DIR 환경변수로 위치 변경 가능. 기본: ~/data/dartcommons-pg
      - ${PG_DATA_DIR:-${HOME}/data/dartcommons-pg}:/var/lib/postgresql/data
      # DB 최초 생성 시 실행되는 init 스크립트 (이미 초기화된 데이터 디렉토리에는 재실행 안 됨)
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dartcommons -d dartcommons"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Chroma 벡터 DB — Stage 3 RAG 임베딩 스토어 (analysis-stage3-rag-chroma Spec)
  # bind mount: ${CHROMA_DATA_DIR:-~/data/dartcommons-chroma}
  # named volume 금지(2026-06-04 91k건 소실 사고 — CLAUDE.md §7)
  # IS_PERSISTENT=TRUE: 컨테이너 재시작 후에도 임베딩 유지
  # ANONYMIZED_TELEMETRY=FALSE: 사용 현황 익명 전송 차단
  chroma:
    image: chromadb/chroma:0.5.23
    container_name: dartcommons-chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    ports:
      - "8001:8000"
    volumes:
      - ${CHROMA_DATA_DIR:-${HOME}/data/dartcommons-chroma}:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
