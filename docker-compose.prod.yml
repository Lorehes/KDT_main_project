# [목적] 프로덕션 서비스 정의 — postgres/backend/frontend 3서비스 + dartcommons-net 내부 네트워크.
# [이유] 로컬 docker-compose.yml과 분리하여 프로덕션 전용 설정 유지.
#   bind mount(/home/ubuntu/data/dartcommons-pg) 패턴 — named volume 금지 (2026-06-04 91k건 손실 교훈).
#   백엔드·프론트엔드 포트는 127.0.0.1에만 바인딩 → Nginx만 접근, 외부 직접 접속 차단.
# [사이드 임팩트] GHCR 이미지 태그는 CI deploy.yml에서 :latest로 push됨.
#   DOCKER_IMAGE_OWNER + GITHUB_REPOSITORY 값은 .env.prod에서 주입 (아래 .env.prod.example 참고).
# [수정 시 고려사항] Ollama 컨테이너 추가 시 services.ollama 섹션 주석 해제.
#   도메인·SSL 설정 후 frontend 환경변수 NEXT_PUBLIC_API_URL은 이미지 재빌드 시 반영됨.
#   PostgreSQL bind mount 경로 변경 시 docs/운영가이드.md 백업 절차도 함께 갱신.

services:
  postgres:
    image: postgres:16-alpine
    container_name: dartcommons-postgres
    env_file: .env.prod
    environment:
      POSTGRES_DB: dartcommons
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # bind mount — Docker reset/clean 영향 없음 (data_protection 교훈, CLAUDE.md §관련패턴).
      # EC2 기본 경로: /home/ubuntu/data/dartcommons-pg
      # PG_DATA_DIR 환경변수로 변경 가능 (.env.prod에 설정)
      - ${PG_DATA_DIR:-/home/ubuntu/data/dartcommons-pg}:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dartcommons-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dartcommons} -d dartcommons"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/dartcommons-backend:latest
    container_name: dartcommons-backend
    env_file: .env.prod
    ports:
      # 127.0.0.1 바인딩 → Nginx만 접근 가능, 외부 직접 접속 차단
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dartcommons-net
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/dartcommons-frontend:latest
    container_name: dartcommons-frontend
    env_file: .env.prod
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    networks:
      - dartcommons-net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m

  # Ollama (선택 — Cloud LLM 전환 시 비활성화)
  # OpenRouter(LLM_PROVIDER=openrouter) 사용 중이면 주석 유지.
  # 온프레미스 LLM 필요 시 주석 해제 + t3.large(8GB) 이상으로 업그레이드.
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: dartcommons-ollama
  #   volumes:
  #     - /home/ubuntu/data/ollama:/root/.ollama
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   restart: unless-stopped
  #   networks:
  #     - dartcommons-net

networks:
  dartcommons-net:
    driver: bridge
