# [목적] EC2 호스트 Nginx 리버스 프록시 — /api/ → BE(8080), / → FE(3000), HTTPS 강제.
# [이유] Docker 컨테이너는 127.0.0.1에만 포트 바인딩. Nginx가 80/443을 받아 내부 라우팅.
#   HTTPS 강제로 평문 전송 방지. SSL은 CloudFlare 또는 certbot(Let's Encrypt)으로 발급.
# [사이드 임팩트] 도메인 변경 시 server_name + OAuth redirect_uri(.env.prod) 함께 갱신.
# [수정 시 고려사항] WebSocket 필요 시 /ws/ location 추가 + proxy_http_version 1.1 설정.
#   Rate limiting 필요 시 limit_req_zone 추가 (공시 API 남용 방지).
#   Let's Encrypt 사용 시 certbot --nginx 명령으로 ssl_certificate 경로 자동 설정됨.
#
# 설치 경로 (EC2): /etc/nginx/sites-available/dartcommons
# 활성화: sudo ln -s /etc/nginx/sites-available/dartcommons /etc/nginx/sites-enabled/dartcommons
# 검증: sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 강제 리다이렉트
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt ACME challenge (certbot 사용 시 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name your-domain.com www.your-domain.com;

    # SSL 인증서 (Let's Encrypt 또는 CloudFlare Origin Certificate)
    # certbot 자동 발급 시: sudo certbot --nginx -d your-domain.com
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # TLS 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;  # PFS 보호 — 세션 티켓 키 유출 시 복호화 차단

    # HSTS — 브라우저가 1년간 HTTPS만 허용, MITM downgrade 공격 방지
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 요청 크기 제한 (공시 원문 업로드 등 고려 시 증가)
    client_max_body_size 10m;

    # 공통 프록시 헤더
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # /api/ → Spring Boot Backend (8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # /actuator/ → Spring Actuator (헬스체크 — 외부 모니터링 허용 시만 노출)
    # 보안: 운영 환경에서는 이 location을 제거하거나 IP 제한 적용.
    # location /actuator/ {
    #     proxy_pass http://127.0.0.1:8080;
    #     allow YOUR_MONITORING_IP;
    #     deny all;
    # }

    # / → Next.js Frontend (3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        # Next.js HMR WebSocket (개발 서버 전용 — 프로덕션 불필요)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";
    }
}
